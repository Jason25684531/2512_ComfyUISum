# ============================================
# StudioCore Frontend - Nginx Configuration
# 用途：靜態檔案服務 + API 反向代理
# ============================================

server {
    listen       80;
    server_name  _;

    # --- 靜態檔案根目錄 ---
    root   /usr/share/nginx/html;
    index  login.html index.html;

    # --- 安全性標頭 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Gzip 壓縮 ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # --- API 反向代理 ---
    # 所有 /api/ 請求轉發到後端服務
    # 使用變數延遲 DNS 解析，避免啟動時後端未就緒導致 Nginx 失敗
    location /api/ {
        resolver 10.96.0.10 valid=10s ipv6=off;
        set $backend "http://backend-service.default.svc.cluster.local:5001";
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket 支援（未來擴展）
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # 超時設定（長時間生成任務）
        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # 傳遞 Cookie（Session 驗證）
        proxy_cookie_path  / /;
    }

    # --- 靜態輸出檔案代理 ---
    # /outputs/ 路徑代理到後端的輸出目錄
    location /outputs/ {
        resolver 10.96.0.10 valid=10s ipv6=off;
        set $backend_outputs "http://backend-service.default.svc.cluster.local:5001";
        proxy_pass         $backend_outputs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # 輸出檔案可能較大，增加超時
        proxy_read_timeout 120s;
    }

    # --- 健康檢查端點 ---
    location /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # --- SPA 路由回退 ---
    # 靜態檔案優先，找不到則回退到 login.html
    location / {
        try_files $uri $uri/ /login.html;
    }

    # --- 靜態資源快取 ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- 錯誤頁面 ---
    error_page 404 /login.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
