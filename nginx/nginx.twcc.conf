# ============================================
# TWCC 環境 Nginx 反向代理設定
# ============================================
# SSL 由 TWCC Load Balancer 卸載，Nginx 只監聽 HTTP 80
# LB → Nginx(:80) → Flask(:5000)
# ============================================

upstream api_backend {
    server backend:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # =========================================
    # 安全與效能設定
    # =========================================
    client_max_body_size 50m;            # 支援大圖/音檔上傳
    proxy_read_timeout 600s;             # 長時間任務的讀取超時
    proxy_connect_timeout 10s;

    # =========================================
    # API 反向代理 → Flask Backend
    # =========================================
    location /api/ {
        proxy_pass http://api_backend;

        # TWCC LB → Nginx 反向代理標頭（關鍵！防止 Mixed Content）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支援（未來 real-time progress 用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================================
    # Health Check 端點（供 LB 探測）
    # =========================================
    location /health {
        proxy_pass http://api_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================
    # 輸出檔案存取 → 代理到 Flask（Flask 負責 S3 redirect）
    # =========================================
    location /outputs/ {
        proxy_pass http://api_backend/outputs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================
    # 後端其它路由（登入、會員等）
    # =========================================
    location ~ ^/(login|register|logout|profile|upload_audio|status|generate|gallery|admin) {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================
    # 前端靜態檔案（HTML/CSS/JS/圖片）
    # =========================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 靜態資源快取（圖片、字型、CSS、JS）
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # =========================================
    # 錯誤頁面
    # =========================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
