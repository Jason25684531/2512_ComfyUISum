---
# ============================================================
# Application Secrets Registry
# 統一管理所有應用層敏感憑證的參考文件
# ============================================================
# 本文件作為集中式 Secret 清單，記錄所有 K8s Secret 資源。
# 實際 Secret 定義分布於各基礎服務文件中：
#   - redis-creds   → k8s/base/01-redis.yaml
#   - minio-creds   → k8s/base/03-minio.yaml
#   - mysql-creds   → k8s/base/05-mysql.yaml
#
# 如需新增應用層 Secret（如 JWT_SECRET, API_KEY 等），
# 請在以下 Secret 資源中定義。
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
  labels:
    app: comfyui-studio
    layer: application
type: Opaque
stringData:
  # ==========================================
  # Flask / Backend 專用密鑰
  # ==========================================
  SECRET_KEY: "dev-secret-key-change-in-production"

  # ==========================================
  # 以下密碼由各基礎服務 Secret 管理
  # (此處列出僅供參考，請勿重複定義)
  # ==========================================
  # REDIS_PASSWORD   → secret: redis-creds   (k8s/base/01-redis.yaml)
  # MYSQL_PASSWORD   → secret: mysql-creds   (k8s/base/05-mysql.yaml)
  # MINIO_SECRET_KEY → secret: minio-creds   (k8s/base/03-minio.yaml)
