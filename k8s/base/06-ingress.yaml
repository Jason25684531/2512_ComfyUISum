---
# Ingress Configuration
# 提供外部訪問入口，將域名路由到 Backend Service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: default
  labels:
    app: backend
  annotations:
    # Nginx Ingress Controller 特定配置
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"  # 開發環境使用 HTTP
spec:
  ingressClassName: nginx
  rules:
  - host: api.studiocore.local  # 本地開發域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5001
