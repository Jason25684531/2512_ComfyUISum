# ============================================
# TWCC Base VM 專用 - 常駐基礎服務
# ============================================
# 用途：TWCC v2.super 常駐 VM，僅包含 nginx + API + Redis + MySQL
# 不包含 Worker、ComfyUI、Ngrok（Worker 在 GPU VM 上直接運行）
#
# 使用方式：
#   docker compose -f docker-compose.base.yml --env-file .env.twcc up -d
#
# ============================================

services:
  # =========================================
  # Nginx 反向代理 + 靜態前端
  # =========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: studio-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.twcc.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - studio-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # =========================================
  # Backend API (Flask)
  # =========================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: studio-backend
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_INTERNAL_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-mysecret}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_INTERNAL_PORT:-3306}
      - DB_USER=${DB_USER:-studio_user}
      - DB_PASSWORD=${DB_PASSWORD:-studio_password}
      - DB_NAME=${DB_NAME:-studio_db}
      - COMFYUI_HOST=${COMFYUI_HOST:-127.0.0.1}
      - COMFYUI_PORT=${COMFYUI_PORT:-8188}
      # TWCC 雲端專用
      - PROXY_FIX=${PROXY_FIX:-true}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-s3}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=${S3_REGION:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - studio-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - ./frontend:/app/frontend:ro
      - ${STORAGE_OUTPUT_DIR:-./storage/outputs}:/app/storage/outputs
      - ${LOG_DIR:-./logs}:/app/logs

  # =========================================
  # Redis 服務
  # =========================================
  redis:
    image: redis:7.2
    container_name: studio-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mysecret}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - ${REDIS_DATA_PATH:-./redis_data}:/data
    restart: unless-stopped
    networks:
      - studio-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mysecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # MySQL 資料庫
  # =========================================
  mysql:
    image: mysql:8.0
    container_name: studio-mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-studio_db}
      - MYSQL_USER=${DB_USER:-studio_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-studio_password}
    volumes:
      - ${MYSQL_DATA_PATH:-./mysql_data}:/var/lib/mysql
    restart: unless-stopped
    networks:
      - studio-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  studio-net:
    driver: bridge
